<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kürtősh Shop | Анімації</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Навігація, яка завжди закріплена зверху -->
    <nav class="navbar">
        <div class="logo">Kürtősh <span>Vibes</span></div>
        <button class="cart-btn">Кошик (0)</button>
    </nav>

    <!-- Перша секція (Екран завантаження) -->
    <section class="hero">
        <h1 class="hero-title">FREAKING DELICIOUS<br><span>KÜRTŐSHKALÁCS</span></h1>
        <!-- Замість фото використовуємо блок із градієнтом для прикладу -->
        <div class="hero-product"></div>
    </section>

    <!-- Друга секція (Анімації при скролінгу) -->
    <section class="scroll-section">
        <div class="info-block info-left">
            <h2>Хрустка скоринка</h2>
            <p>Карамелізований цукор ззовні та неймовірно ніжне тісто всередині. Випікається на справжньому вогні.</p>
        </div>
        
        <div class="info-block info-right">
            <h2>10+ Смаків</h2>
            <p>Класична кориця, кокосова стружка, подрібнені горіхи, солона карамель або щедра порція Nutella.</p>
        </div>
    </section>

    <!-- Підключаємо бібліотеки GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- Підключаємо наш файл зі скриптами -->
    <script src="script.js"></script>
</body>
</html>
